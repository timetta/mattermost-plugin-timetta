name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build plugin bundle
        shell: pwsh
        run: ./build.ps1

      - name: Create GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $version = (Get-Content plugin.json | ConvertFrom-Json).version
          $expectedTag = "v$version"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
              throw "Tag $env:GITHUB_REF_NAME does not match plugin version $version. Expected $expectedTag."
          }

          $archive = "dist/com.timetta.link-preview-$version.tar.gz"
          if (-not (Test-Path -LiteralPath $archive)) {
              throw "Release archive was not created: $archive"
          }

          gh release create $env:GITHUB_REF_NAME $archive `
              --verify-tag `
              --title "Timetta Link Preview $env:GITHUB_REF_NAME" `
              --generate-notes
